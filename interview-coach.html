<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 面试陪练官</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const mockQuestions = {
      'frontend': [
        { id: 'fe-1', content: '请介绍一下你最熟悉的前端框架（React/Vue）的核心特性？', type: 'technical' },
        { id: 'fe-2', content: '在项目中遇到过哪些性能优化问题？你是如何解决的？', type: 'technical' },
        { id: 'fe-3', content: '请描述一下浏览器的事件循环机制？', type: 'technical' },
        { id: 'fe-4', content: '你做过最有挑战的前端项目是什么？遇到了哪些困难？', type: 'behavioral' },
        { id: 'fe-5', content: '如果遇到一个紧急的线上 bug，你会如何处理？', type: 'situational' },
      ],
      'backend': [
        { id: 'be-1', content: '请介绍一下你熟悉的数据库（MySQL/PostgreSQL）的索引优化策略？', type: 'technical' },
        { id: 'be-2', content: '如何保证分布式系统的数据一致性？', type: 'technical' },
        { id: 'be-3', content: '你做过的项目中，如何处理高并发场景？', type: 'technical' },
        { id: 'be-4', content: '当团队成员之间产生技术分歧时，你会如何处理？', type: 'cultural' },
        { id: 'be-5', content: '如果线上服务突然崩溃，你会如何排查问题？', type: 'situational' },
      ],
      'product': [
        { id: 'pm-1', content: '请分享一个你主导设计的产品功能，从需求分析到上线的完整过程？', type: 'behavioral' },
        { id: 'pm-2', content: '如何处理用户需求与技术实现之间的冲突？', type: 'situational' },
        { id: 'pm-3', content: '你是如何进行用户研究的？常用哪些方法和工具？', type: 'technical' },
        { id: 'pm-4', content: '当产品数据不如预期时，你会如何分析和改进？', type: 'situational' },
        { id: 'pm-5', content: '你认为一个优秀的产品经理应该具备哪些特质？', type: 'cultural' },
      ],
      'data': [
        { id: 'da-1', content: '请描述一下你常用的数据清洗流程？', type: 'technical' },
        { id: 'da-2', content: '如何用 SQL 实现用户留存率的计算？', type: 'technical' },
        { id: 'da-3', content: '你做过的最有价值的数据洞察是什么？', type: 'behavioral' },
        { id: 'da-4', content: '当数据结果与业务直觉不符时，你会如何处理？', type: 'situational' },
        { id: 'da-5', content: '你如何向非技术背景的业务人员解释复杂的数据概念？', type: 'cultural' },
      ],
    };

    const defaultQuestions = [
      { id: 'def-1', content: '请简单介绍一下你自己和你的工作经历？', type: 'behavioral' },
      { id: 'def-2', content: '你为什么想来我们公司工作？', type: 'cultural' },
      { id: 'def-3', content: '你做过最有成就感的项目是什么？', type: 'behavioral' },
      { id: 'def-4', content: '你最大的优点和缺点是什么？', type: 'cultural' },
      { id: 'def-5', content: '未来 3-5 年的职业规划是什么？', type: 'cultural' },
    ];

    function generateFeedback(answer) {
      const length = answer.length;
      let rating, comment, optimizedAnswer, strengths = [], weaknesses = [];

      if (length < 50) {
        rating = Math.floor(Math.random() * 2) + 1;
        comment = '回答过于简短，缺乏具体细节和案例支撑。建议使用 STAR 法则（情境、任务、行动、结果）来组织回答。';
        optimizedAnswer = '建议补充具体的项目案例，描述当时的背景、你遇到的挑战、采取的行动以及最终达成的成果。使用量化数据来展示你的贡献会更有说服力。';
        weaknesses = ['回答过于简略', '缺乏具体案例', '没有量化成果'];
      } else if (length < 150) {
        rating = Math.floor(Math.random() * 2) + 3;
        comment = '回答有一定的内容，但还可以更加深入。建议增加更多细节，特别是具体的行动步骤和量化成果。';
        optimizedAnswer = '建议进一步展开描述，增加具体的数据支撑和成果展示。可以按照 STAR 法则重新组织回答结构，使逻辑更加清晰。';
        strengths = ['有基本的框架', '内容相关'];
        weaknesses = ['深度不够', '缺乏数据支撑'];
      } else {
        rating = Math.floor(Math.random() * 2) + 4;
        comment = '回答比较完整，有具体案例和细节。如果能增加更多量化数据和对比效果，会更加出色。';
        optimizedAnswer = '回答结构清晰，内容详实。建议在关键成果部分增加具体的数字对比，如提升了多少效率、节省了多少成本等，这样能更直观地展示你的价值。';
        strengths = ['内容完整', '有具体案例', '结构清晰'];
        weaknesses = ['可增加量化数据'];
      }
      return { rating, comment, optimizedAnswer, strengths, weaknesses };
    }

    function generateResults(answers) {
      const totalRating = answers.reduce((sum, ans) => sum + ans.feedback.rating, 0);
      const avgRating = Math.round((totalRating / answers.length) * 2) / 2;

      const radarData = [
        { dimension: '表达逻辑', score: Math.floor(Math.random() * 30) + 60 },
        { dimension: '专业深度', score: Math.floor(Math.random() * 30) + 55 },
        { dimension: '临场应变', score: Math.floor(Math.random() * 30) + 50 },
        { dimension: '沟通能力', score: Math.floor(Math.random() * 30) + 65 },
        { dimension: '结构化思维', score: Math.floor(Math.random() * 30) + 55 },
        { dimension: '职业素养', score: Math.floor(Math.random() * 30) + 70 },
      ];

      const suggestions = [];
      radarData.forEach(item => {
        if (item.score < 65) {
          suggestions.push(`提升${item.dimension}能力，建议多进行针对性练习`);
        }
      });

      let summary = '';
      if (avgRating >= 4) {
        summary = '你的面试表现优秀！回答结构清晰，内容详实，有很强的竞争力。继续保持，建议针对薄弱环节进行补充练习。';
      } else if (avgRating >= 3) {
        summary = '你的面试表现良好，但还有提升空间。建议增加更多量化数据和具体案例来增强说服力。';
      } else {
        summary = '建议多进行模拟练习，提升回答的深度和结构化程度。使用 STAR 法则来组织你的回答会更有效。';
      }

      return { radarData, summary, suggestions: suggestions.length > 0 ? suggestions : ['继续保持，你的表现已经很不错了！'], avgRating, totalQuestions: answers.length, answeredQuestions: answers.length };
    }

    const industries = ['互联网', '金融', '教育', '医疗', '制造', '零售', '其他'];
    const positions = [
      { name: '前端开发', icon: 'code' },
      { name: '后端开发', icon: 'server' },
      { name: '产品经理', icon: 'layout' },
      { name: '数据分析师', icon: 'bar-chart-3' },
      { name: 'UI/UX设计师', icon: 'palette' },
      { name: '运营', icon: 'trending-up' },
    ];

    function RadarChart({ data }) {
      const center = 120;
      const radius = 100;
      const levels = 5;
      const angleStep = (2 * Math.PI) / data.length;

      const getPoint = (index, value, r = radius) => {
        const angle = angleStep * index - Math.PI / 2;
        const x = center + (r * value / 100) * Math.cos(angle);
        const y = center + (r * value / 100) * Math.sin(angle);
        return { x, y };
      };

      const polygonPoints = data.map((item, i) => {
        const point = getPoint(i, item.score);
        return `${point.x},${point.y}`;
      }).join(' ');

      const gridLines = [];
      for (let level = 1; level <= levels; level++) {
        const r = (radius * level) / levels;
        const points = data.map((_, i) => {
          const point = getPoint(i, 100, r);
          return `${point.x},${point.y}`;
        }).join(' ');
        gridLines.push(<polygon key={level} points={points} fill="none" stroke="#475569" strokeWidth="1" />);
      }

      const axisLines = data.map((_, i) => {
        const point = getPoint(i, 100);
        return <line key={i} x1={center} y1={center} x2={point.x} y2={point.y} stroke="#475569" strokeWidth="1" />;
      });

      const labels = data.map((item, i) => {
        const point = getPoint(i, 100, radius + 30);
        return <text key={i} x={point.x} y={point.y} textAnchor="middle" dominantBaseline="middle" fill="#94a3b8" fontSize="11">{item.dimension}</text>;
      });

      return (
        <svg width="280" height="280" className="mx-auto">
          {gridLines}
          {axisLines}
          <polygon points={polygonPoints} fill="rgba(0, 212, 170, 0.2)" stroke="#00d4aa" strokeWidth="2" />
          {data.map((item, i) => {
            const point = getPoint(i, item.score);
            return <circle key={i} cx={point.x} cy={point.y} r="4" fill="#00d4aa" />;
          })}
          {labels}
          <circle cx={center} cy={center} r="4" fill="#00d4aa" />
        </svg>
      );
    }

    function Home({ onStart }) {
      const [jd, setJd] = useState('');
      const [industry, setIndustry] = useState('互联网');
      const [position, setPosition] = useState('');
      const [selectedPosition, setSelectedPosition] = useState('');

      const handleStart = () => {
        const finalPosition = selectedPosition || position || '通用岗位';
        let questions = defaultQuestions;
        if (finalPosition.includes('前端') || finalPosition.includes('FE') || finalPosition.includes('front')) questions = mockQuestions['frontend'];
        else if (finalPosition.includes('后端') || finalPosition.includes('BE') || finalPosition.includes('back')) questions = mockQuestions['backend'];
        else if (finalPosition.includes('产品') || finalPosition.includes('PM') || finalPosition.includes('product')) questions = mockQuestions['product'];
        else if (finalPosition.includes('数据') || finalPosition.includes('data') || finalPosition.includes('分析')) questions = mockQuestions['data'];

        onStart({ jd, industry, position: finalPosition, questions: questions.slice(0, 5) });
      };

      useEffect(() => lucide.createIcons(), []);

      return (
        <div className="min-h-screen">
          <nav className="fixed top-0 left-0 right-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-700">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-r from-emerald-400 to-cyan-500 rounded-xl flex items-center justify-center">
                  <i data-lucide="target" className="w-6 h-6 text-white"></i>
                </div>
                <span className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">AI 面试陪练官</span>
              </div>
              <button onClick={handleStart} className="px-6 py-2.5 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium rounded-lg hover:shadow-lg hover:shadow-emerald-500/25 transition-all duration-300 hover:scale-105">开始练习</button>
            </div>
          </nav>

          <section className="pt-24 pb-16 px-4">
            <div className="max-w-6xl mx-auto">
              <div className="text-center mb-12">
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-sm font-medium mb-6">
                  <i data-lucide="zap" className="w-4 h-4"></i> AI 驱动的智能面试辅导
                </div>
                <h1 className="text-4xl md:text-5xl font-bold text-white mb-4">
                  让每一次练习都成为
                  <span className="bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent"> 面试加分项</span>
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl mx-auto">基于 AI 的模拟面试平台，输入目标岗位 JD，获得针对性提问和专业反馈，让你的面试准备更高效</p>
              </div>

              <div className="grid md:grid-cols-3 gap-6 mb-12">
                <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 hover:border-emerald-500/30 transition-all duration-300">
                  <div className="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center mb-4">
                    <i data-lucide="target" className="w-6 h-6 text-emerald-400"></i>
                  </div>
                  <h3 className="text-lg font-semibold text-white mb-2">针对性训练</h3>
                  <p className="text-slate-400">根据目标岗位 JD 智能生成面试问题，精准匹配能力要求</p>
                </div>
                <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 hover:border-cyan-500/30 transition-all duration-300">
                  <div className="w-12 h-12 bg-cyan-500/10 rounded-xl flex items-center justify-center mb-4">
                    <i data-lucide="bar-chart-3" className="w-6 h-6 text-cyan-400"></i>
                  </div>
                  <h3 className="text-lg font-semibold text-white mb-2">实时反馈</h3>
                  <p className="text-slate-400">作答后立即获得专业点评、优化建议和能力雷达图分析</p>
                </div>
                <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 hover:border-purple-500/30 transition-all duration-300">
                  <div className="w-12 h-12 bg-purple-500/10 rounded-xl flex items-center justify-center mb-4">
                    <i data-lucide="users" className="w-6 h-6 text-purple-400"></i>
                  </div>
                  <h3 className="text-lg font-semibold text-white mb-2">场景模拟</h3>
                  <p className="text-slate-400">还原真实面试场景，体验面试官视角，提升临场应变能力</p>
                </div>
              </div>

              <div className="bg-slate-800/30 backdrop-blur-sm rounded-3xl p-8 border border-slate-700/50">
                <h2 className="text-2xl font-bold text-white mb-6 text-center">开始你的面试练习</h2>
                <div className="grid md:grid-cols-2 gap-8">
                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-2">目标岗位 JD</label>
                      <textarea value={jd} onChange={(e) => setJd(e.target.value)} placeholder="请粘贴目标岗位的职位描述（JD）..." className="w-full h-32 px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 resize-none transition-all" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">所属行业</label>
                        <select value={industry} onChange={(e) => setIndustry(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 transition-all">
                          {industries.map((ind) => <option key={ind} value={ind}>{ind}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">岗位类型</label>
                        <input value={position} onChange={(e) => setPosition(e.target.value)} placeholder="输入岗位名称" className="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 transition-all" />
                      </div>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-3">热门岗位快速选择</label>
                    <div className="grid grid-cols-2 gap-3">
                      {positions.map((pos) => (
                        <button key={pos.name} onClick={() => { setSelectedPosition(pos.name); setPosition(pos.name); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl border transition-all duration-300 ${selectedPosition === pos.name ? 'bg-emerald-500/10 border-emerald-500 text-emerald-400' : 'bg-slate-900/50 border-slate-600 text-slate-300 hover:border-emerald-500/50 hover:text-white'}`}>
                          <i data-lucide="briefcase" className="w-5 h-5"></i>
                          <span className="font-medium">{pos.name}</span>
                        </button>
                      ))}
                    </div>
                    <button onClick={handleStart} className="w-full mt-6 py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold rounded-xl hover:shadow-xl hover:shadow-emerald-500/25 transition-all duration-300 hover:scale-[1.02] flex items-center justify-center gap-2">
                      开始模拟面试
                      <i data-lucide="arrow-right" className="w-5 h-5"></i>
                    </button>
                  </div>
                </div>
              </div>

              <div className="mt-16 grid md:grid-cols-3 gap-6">
                <div className="text-center">
                  <div className="text-4xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent mb-2">50,000+</div>
                  <div className="text-slate-400">模拟面试次数</div>
                </div>
                <div className="text-center">
                  <div className="text-4xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">98%</div>
                  <div className="text-slate-400">用户好评率</div>
                </div>
                <div className="text-center">
                  <div className="text-4xl font-bold bg-gradient-to-r from-orange-400 to-yellow-400 bg-clip-text text-transparent mb-2">500+</div>
                  <div className="text-slate-400">岗位覆盖</div>
                </div>
              </div>

              <div className="mt-16 bg-slate-800/30 rounded-3xl p-8 border border-slate-700/50">
                <h2 className="text-2xl font-bold text-white mb-6 text-center">用户反馈</h2>
                <div className="grid md:grid-cols-3 gap-6">
                  <div className="bg-slate-900/50 rounded-2xl p-6">
                    <div className="flex items-center gap-1 mb-4">
                      {[1, 2, 3, 4, 5].map((star) => (
                        <svg key={star} className="w-5 h-5 text-yellow-400 fill-yellow-400" viewBox="0 0 20 20">
                          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                        </svg>
                      ))}
                    </div>
                    <p className="text-slate-300 mb-4">"面试前用这个工具练习了3次，真实面试时明显感觉更自信了。反馈很专业，指出了我表达上的很多问题。"</p>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full flex items-center justify-center text-white font-bold">张</div>
                      <div>
                        <div className="text-white font-medium">张明</div>
                        <div className="text-slate-500 text-sm">产品经理</div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-slate-900/50 rounded-2xl p-6">
                    <div className="flex items-center gap-1 mb-4">
                      {[1, 2, 3, 4, 5].map((star) => (
                        <svg key={star} className="w-5 h-5 text-yellow-400 fill-yellow-400" viewBox="0 0 20 20">
                          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                        </svg>
                      ))}
                    </div>
                    <p className="text-slate-300 mb-4">"作为应届生，这个工具帮我快速了解了面试流程和面试官关注点。能力雷达图让我清楚知道自己哪里需要改进。"</p>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-white font-bold">李</div>
                      <div>
                        <div className="text-white font-medium">李婷</div>
                        <div className="text-slate-500 text-sm">前端开发</div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-slate-900/50 rounded-2xl p-6">
                    <div className="flex items-center gap-1 mb-4">
                      {[1, 2, 3, 4, 5].map((star) => (
                        <svg key={star} className="w-5 h-5 text-yellow-400 fill-yellow-400" viewBox="0 0 20 20">
                          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                        </svg>
                      ))}
                    </div>
                    <p className="text-slate-300 mb-4">"转行产品经理时用这个工具练了一周，拿到了3个offer！优化建议特别实用，帮我弥补了经验不足的短板。"</p>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-gradient-to-r from-orange-500 to-yellow-500 rounded-full flex items-center justify-center text-white font-bold">王</div>
                      <div>
                        <div className="text-white font-medium">王伟</div>
                        <div className="text-slate-500 text-sm">产品经理</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <footer className="border-t border-slate-800 py-8">
            <div className="max-w-6xl mx-auto px-4 text-center text-slate-500">
              <div className="flex items-center justify-center gap-2 mb-2">
                <i data-lucide="check-circle" className="w-4 h-4 text-emerald-400"></i>
                <span>AI 面试陪练官 - 让面试更自信</span>
              </div>
              <p className="text-sm">© 2026 AI Interview Coach. All rights reserved.</p>
            </div>
          </footer>
        </div>
      );
    }

    function Interview({ session, onFinish }) {
      const [answer, setAnswer] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [messages, setMessages] = useState([{ id: '1', role: 'interviewer', content: session.questions[0].content }]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const messagesEndRef = useRef(null);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
      useEffect(() => { lucide.createIcons(); }, [messages]);

      const handleSubmit = () => {
        if (!answer.trim() || isLoading) return;
        setIsLoading(true);

        const userMsg = { id: `msg-${Date.now()}`, role: 'user', content: answer };
        setMessages(prev => [...prev, userMsg]);
        setAnswer('');

        const feedback = generateFeedback(answer);
        userMsg.feedback = feedback;

        const nextIndex = currentIndex + 1;
        if (nextIndex < session.questions.length) {
          setTimeout(() => {
            setMessages(prev => [...prev, { id: `msg-${Date.now()}-q`, role: 'interviewer', content: session.questions[nextIndex].content }]);
            setCurrentIndex(nextIndex);
            setIsLoading(false);
          }, 1000);
        } else {
          setTimeout(() => { onFinish(generateResults([{ ...userMsg }])); }, 1000);
        }
      };

      const progressPercentage = ((currentIndex + 1) / session.questions.length) * 100;

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="bg-slate-900/80 backdrop-blur-md border-b border-slate-700">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-r from-emerald-400 to-cyan-500 rounded-xl flex items-center justify-center">
                  <i data-lucide="message-square" className="w-6 h-6 text-white"></i>
                </div>
                <span className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">AI 面试陪练官</span>
              </div>
              <button onClick={() => window.location.reload()} className="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all">结束面试</button>
            </div>
          </nav>

          <div className="flex-1 flex flex-col max-w-4xl mx-auto w-full">
            <div className="px-4 py-4 bg-slate-800/30 border-b border-slate-700/50">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm text-slate-400">面试进度</span>
                <span className="text-sm font-medium text-emerald-400">{currentIndex + 1} / {session.questions.length}</span>
              </div>
              <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 transition-all duration-500" style={{ width: `${progressPercentage}%` }} />
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide">
              {messages.map((msg) => (
                <div key={msg.id} className={`flex gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                  <div className={`w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center ${msg.role === 'user' ? 'bg-gradient-to-r from-emerald-500 to-cyan-500' : 'bg-gradient-to-r from-purple-500 to-pink-500'}`}>
                    <span className="text-white font-bold text-sm">{msg.role === 'user' ? '你' : 'AI'}</span>
                  </div>
                  <div className={`max-w-[75%] ${msg.role === 'user' ? 'text-right' : ''}`}>
                    <div className={`inline-block rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-gradient-to-r from-emerald-500/20 to-cyan-500/20 border border-emerald-500/30 text-white' : 'bg-slate-800/50 border border-slate-700/50 text-white'}`}>
                      <p className="text-sm leading-relaxed">{msg.content}</p>
                    </div>

                    {msg.role === 'user' && msg.feedback && (
                      <div className="mt-3 bg-slate-800/50 rounded-xl p-4 border border-slate-700/50 text-left">
                        <div className="flex items-center gap-2 mb-3">
                          <span className="text-sm font-medium text-slate-300">AI 点评</span>
                          <div className="flex">
                            {Array(5).fill(0).map((_, i) => (
                              <svg key={i} className={`w-4 h-4 ${i < msg.feedback.rating ? 'text-yellow-400 fill-yellow-400' : 'text-slate-600'}`} viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                              </svg>
                            ))}
                          </div>
                          <span className="text-sm text-emerald-400 ml-auto">{msg.feedback.rating}/5</span>
                        </div>
                        <p className="text-sm text-slate-300 mb-3">{msg.feedback.comment}</p>
                        <div className="space-y-3">
                          {msg.feedback.strengths.length > 0 && (
                            <div className="flex items-start gap-2">
                              <i data-lucide="check-circle" className="w-4 h-4 text-emerald-400 flex-shrink-0 mt-0.5"></i>
                              <div>
                                <span className="text-sm font-medium text-emerald-400">优点：</span>
                                <span className="text-sm text-slate-300 ml-1">{msg.feedback.strengths.join('、')}</span>
                              </div>
                            </div>
                          )}
                          {msg.feedback.weaknesses.length > 0 && (
                            <div className="flex items-start gap-2">
                              <i data-lucide="x-circle" className="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5"></i>
                              <div>
                                <span className="text-sm font-medium text-red-400">待改进：</span>
                                <span className="text-sm text-slate-300 ml-1">{msg.feedback.weaknesses.join('、')}</span>
                              </div>
                            </div>
                          )}
                          <div className="flex items-start gap-2">
                            <i data-lucide="lightbulb" className="w-4 h-4 text-yellow-400 flex-shrink-0 mt-0.5"></i>
                            <div>
                              <span className="text-sm font-medium text-yellow-400">优化建议：</span>
                              <p className="text-sm text-slate-300 mt-1">{msg.feedback.optimizedAnswer}</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ))}

              {isLoading && (
                <div className="flex gap-4">
                  <div className="w-10 h-10 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex-shrink-0 flex items-center justify-center">
                    <span className="text-white font-bold text-sm">AI</span>
                  </div>
                  <div className="bg-slate-800/50 rounded-2xl px-4 py-3 border border-slate-700/50">
                    <div className="flex gap-2">
                      <div className="w-3 h-3 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                      <div className="w-3 h-3 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                      <div className="w-3 h-3 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                    </div>
                  </div>
                </div>
              )}

              <div ref={messagesEndRef} />
            </div>

            <div className="p-4 bg-slate-900/80 backdrop-blur-md border-t border-slate-700">
              <div className="flex items-center gap-2 mb-2">
                <i data-lucide="clock" className="w-4 h-4 text-slate-500"></i>
                <span className="text-xs text-slate-500">提示：按 Enter 发送，Shift+Enter 换行</span>
              </div>
              <div className="flex gap-3">
                <textarea value={answer} onChange={(e) => setAnswer(e.target.value)} onKeyPress={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); } }} placeholder="请输入你的回答..." className="flex-1 h-20 px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/50 resize-none transition-all" />
                <button onClick={handleSubmit} disabled={!answer.trim() || isLoading} className={`w-14 h-20 rounded-xl flex items-center justify-center transition-all ${answer.trim() && !isLoading ? 'bg-gradient-to-r from-emerald-500 to-cyan-500 hover:shadow-lg hover:shadow-emerald-500/25 hover:scale-105' : 'bg-slate-700 cursor-not-allowed'}`}>
                  {isLoading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <i data-lucide="send" className="w-5 h-5 text-white"></i>}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Results({ results, onRestart }) {
      useEffect(() => { lucide.createIcons(); }, []);

      const averageScore = Math.round(results.radarData.reduce((sum, item) => sum + item.score, 0) / results.radarData.length);

      const getScoreColor = (score) => {
        if (score >= 80) return '#00d4aa';
        if (score >= 65) return '#60a5fa';
        if (score >= 50) return '#f59e0b';
        return '#ef4444';
      };

      const getScoreLabel = (score) => {
        if (score >= 80) return '优秀';
        if (score >= 65) return '良好';
        if (score >= 50) return '待提升';
        return '需加强';
      };

      const getScoreBgColor = (score) => {
        if (score >= 80) return 'bg-emerald-500/10 text-emerald-400';
        if (score >= 65) return 'bg-blue-500/10 text-blue-400';
        if (score >= 50) return 'bg-amber-500/10 text-amber-400';
        return 'bg-red-500/10 text-red-400';
      };

      return (
        <div className="min-h-screen">
          <nav className="bg-slate-900/80 backdrop-blur-md border-b border-slate-700">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-r from-emerald-400 to-cyan-500 rounded-xl flex items-center justify-center">
                  <i data-lucide="bar-chart-3" className="w-6 h-6 text-white"></i>
                </div>
                <span className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">AI 面试陪练官</span>
              </div>
              <button onClick={onRestart} className="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-all flex items-center gap-2">
                <i data-lucide="home" className="w-4 h-4"></i> 返回首页
              </button>
            </div>
          </nav>

          <section className="pt-8 pb-16 px-4">
            <div className="max-w-6xl mx-auto">
              <div className="text-center mb-8">
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-sm font-medium mb-4">
                  <i data-lucide="trophy" className="w-4 h-4"></i> 面试完成
                </div>
                <h1 className="text-3xl font-bold text-white mb-2">面试评估报告</h1>
                <p className="text-slate-400">以下是你的面试表现分析和改进建议</p>
              </div>

              <div className="grid md:grid-cols-4 gap-4 mb-8">
                <div className="bg-gradient-to-br from-emerald-500/20 to-cyan-500/20 rounded-2xl p-6 border border-emerald-500/20">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center">
                      <i data-lucide="star" className="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <span className="text-sm text-slate-300">平均评分</span>
                  </div>
                  <div className="text-4xl font-bold text-white">{results.avgRating}<span className="text-lg text-slate-400">/5</span></div>
                  <div className="flex mt-2">
                    {Array(5).fill(0).map((_, i) => (
                      <svg key={i} className={`w-4 h-4 ${i < results.avgRating ? 'text-yellow-400 fill-yellow-400' : 'text-slate-600'}`} viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                      </svg>
                    ))}
                  </div>
                </div>
                <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center">
                      <i data-lucide="target" className="w-5 h-5 text-blue-400"></i>
                    </div>
                    <span className="text-sm text-slate-300">能力总分</span>
                  </div>
                  <div className="text-4xl font-bold text-white">{averageScore}<span className="text-lg text-slate-400">/100</span></div>
                  <div className={`text-sm mt-2 ${getScoreBgColor(averageScore)} inline-block px-2 py-1 rounded-full`}>{getScoreLabel(averageScore)}</div>
                </div>
                <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-purple-500/20 rounded-xl flex items-center justify-center">
                      <i data-lucide="bar-chart-3" className="w-5 h-5 text-purple-400"></i>
                    </div>
                    <span className="text-sm text-slate-300">回答题数</span>
                  </div>
                  <div className="text-4xl font-bold text-white">{results.answeredQuestions}<span className="text-lg text-slate-400">/{results.totalQuestions}</span></div>
                  <div className="text-sm text-slate-400 mt-2">已完成全部问题</div>
                </div>
                <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-orange-500/20 rounded-xl flex items-center justify-center">
                      <i data-lucide="trending-up" className="w-5 h-5 text-orange-400"></i>
                    </div>
                    <span className="text-sm text-slate-300">建议改进</span>
                  </div>
                  <div className="text-4xl font-bold text-white">{results.suggestions.length}</div>
                  <div className="text-sm text-slate-400 mt-2">项待提升</div>
                </div>
              </div>

              <div className="grid md:grid-cols-2 gap-6 mb-8">
                <div className="bg-slate-800/30 rounded-3xl p-6 border border-slate-700/50">
                  <h2 className="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <i data-lucide="target" className="w-5 h-5 text-emerald-400"></i> 能力雷达图
                  </h2>
                  <RadarChart data={results.radarData} />
                </div>
                <div className="bg-slate-800/30 rounded-3xl p-6 border border-slate-700/50">
                  <h2 className="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <i data-lucide="trending-up" className="w-5 h-5 text-cyan-400"></i> 能力详细分析
                  </h2>
                  <div className="space-y-4">
                    {results.radarData.map((item) => (
                      <div key={item.dimension}>
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-sm text-slate-300">{item.dimension}</span>
                          <div className="flex items-center gap-2">
                            <span className={`text-sm font-medium ${item.score >= 80 ? 'text-emerald-400' : item.score >= 65 ? 'text-blue-400' : item.score >= 50 ? 'text-amber-400' : 'text-red-400'}`}>{item.score}分</span>
                            <span className={`text-xs px-2 py-0.5 rounded-full ${getScoreBgColor(item.score)}`}>{getScoreLabel(item.score)}</span>
                          </div>
                        </div>
                        <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                          <div className="h-full transition-all duration-500" style={{ width: `${item.score}%`, backgroundColor: getScoreColor(item.score) }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="bg-slate-800/30 rounded-3xl p-6 border border-slate-700/50 mb-8">
                <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                  <i data-lucide="trophy" className="w-5 h-5 text-yellow-400"></i> 综合评价
                </h2>
                <div className="bg-slate-900/50 rounded-2xl p-6 border border-slate-700/50">
                  <p className="text-slate-300 leading-relaxed">{results.summary}</p>
                </div>
              </div>

              <div className="bg-slate-800/30 rounded-3xl p-6 border border-slate-700/50 mb-8">
                <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                  <i data-lucide="check-circle" className="w-5 h-5 text-green-400"></i> 改进建议
                </h2>
                <div className="grid md:grid-cols-2 gap-4">
                  {results.suggestions.map((suggestion, index) => (
                    <div key={index} className="bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 flex items-start gap-3">
                      <div className="w-6 h-6 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span className="text-emerald-400 text-xs font-bold">{index + 1}</span>
                      </div>
                      <p className="text-slate-300 text-sm">{suggestion}</p>
                    </div>
                  ))}
                </div>
              </div>

              <div className="flex justify-center gap-4">
                <button onClick={onRestart} className="px-8 py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold rounded-xl hover:shadow-xl hover:shadow-emerald-500/25 transition-all duration-300 hover:scale-[1.02] flex items-center gap-2">
                  <i data-lucide="rotate-ccw" className="w-5 h-5"></i> 再练一次
                </button>
                <button onClick={onRestart} className="px-8 py-4 bg-slate-800 text-white font-semibold rounded-xl border border-slate-600 hover:border-emerald-500/50 hover:bg-slate-700 transition-all duration-300 flex items-center gap-2">
                  返回首页
                  <i data-lucide="arrow-right" className="w-5 h-5"></i>
                </button>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [session, setSession] = useState(null);
      const [results, setResults] = useState(null);

      const handleStartInterview = (data) => { setSession(data); setCurrentPage('interview'); };
      const handleFinishInterview = (data) => { setResults(data); setCurrentPage('results'); };
      const handleRestart = () => { setSession(null); setResults(null); setCurrentPage('home'); };

      useEffect(() => { lucide.createIcons(); }, [currentPage]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
          {currentPage === 'home' && <Home onStart={handleStartInterview} />}
          {currentPage === 'interview' && session && <Interview session={session} onFinish={handleFinishInterview} />}
          {currentPage === 'results' && results && <Results results={results} onRestart={handleRestart} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
